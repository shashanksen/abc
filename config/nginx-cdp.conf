# CDP Platform — nginx routing
# /            → Next.js (port 3000)
# /api/agent/  → FastAPI streaming (port 8000) — SSE-tuned
# /api/        → FastAPI (port 8000) — normal JSON
#
# The /api/agent/ block is carved out before /api/ so it matches first.
# Streaming endpoints need proxy_buffering off + a long proxy_read_timeout.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # ── FastAPI streaming endpoints (/api/agent/) ──────────────────────────
    location /api/agent/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE essentials
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        add_header X-Accel-Buffering "no" always;
        chunked_transfer_encoding on;
    }

    # ── FastAPI /api/ ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Next.js everything else ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health checks ───────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
